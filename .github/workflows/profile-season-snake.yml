name: generate profile season snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Write season-snake settings
        run: |
          mkdir -p conf
          cat > conf/season-snake.json <<'JSON'
          {
            "type": "season",
            "fileName": "profile-season-snake.svg",
            "backgroundColor": "#ffffff",
            "foregroundColor": "#00000f",
            "strongColor": "#111133",
            "weakColor": "gray",
            "radarColor": "#47a042",
            "growingAnimation": true,
            "contribColors1": [
              "#efefef",
              "#ffe7ff",
              "#edaeda",
              "#e492ca",
              "#ba7aad"
            ],
            "contribColors2": [
              "#efefef",
              "#d8e887",
              "#8cc569",
              "#47a042",
              "#1d6a23"
            ],
            "contribColors3": [
              "#efefef",
              "#ffed4a",
              "#ffc402",
              "#fe9400",
              "#fa6100"
            ],
            "contribColors4": [
              "#efefef",
              "#999999",
              "#cccccc",
              "#dddddd",
              "#eeeeee"
            ],
            "snakeAnimation": {
              "enabled": true,
              "pathMode": "snk",
              "solverSnakeLength": 4,
              "duration": "18s",
              "eatDuration": "0.35s",
              "segmentCount": 11,
              "segmentGap": 1,
              "segmentScale": 0.38,
              "headColor": "#5b21b6",
              "bodyColor": "#8b5cf6",
              "eyeColor": "#ffffff",
              "shadowColor": "rgba(76, 29, 149, 0.18)"
            }
          }
          JSON

      - name: Generate season-snake SVG
        uses: KunYing-Lee/github-profile-3d-contrib@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          SETTING_JSON: conf/season-snake.json

      - name: Commit generated SVG
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add profile-3d-contrib/profile-season-snake.svg conf/season-snake.json
          if git commit -m "generated season-snake"; then
            git push
          fi
